<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Block Blaster Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}
canvas{
background:#111;
border:2px solid #fff;
touch-action:none;
}
</style>
</head>
<body>
<canvas id="game" width="360" height="600"></canvas>

<script>
// ---------------- SETUP ----------------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// GAME STATS
let score = 0;
let gameOver = false;
let level = 1;
let lives = 3;

// PADDLE
let paddle = {
width: 80,
height: 12,
x: canvas.width/2 - 40,
y: canvas.height - 30,
speed: 6
};

// BALL
let ball = {
size: 10,
x: canvas.width/2,
y: canvas.height/2,
dx: 4,
dy: -4
};

// BLOCKS
let blocks = [];
let baseRows = 5;
let baseCols = 6;
let blockWidth = 50;
let blockHeight = 18;
let padding = 8;
let offsetTop = 40;
let offsetLeft = 20;

// Power-up
let powerUps = [];
let activePower = null;
let powerTimer = 0;

// Block colors per level
const colors = ["#22c55e","#facc15","#fb923c","#f87171"];

// Create blocks for current level
function createBlocks(){
blocks = [];
let rows = baseRows + level - 1;
let cols = baseCols + level - 1;
for(let r=0;r<rows;r++){
for(let c=0;c<cols;c++){
blocks.push({
x: offsetLeft + c*(blockWidth+padding),
y: offsetTop + r*(blockHeight+padding),
broken:false,
color: colors[r % colors.length]
});
}
}
}

createBlocks();

// ---------------- CONTROLS ----------------
let left=false;
let right=false;

// keyboard
document.addEventListener("keydown", e => {
if(e.key==="ArrowLeft") left=true;
if(e.key==="ArrowRight") right=true;
if(gameOver && e.key==="r") resetGame();
});
document.addEventListener("keyup", e => {
if(e.key==="ArrowLeft") left=false;
if(e.key==="ArrowRight") right=false;
});

// mobile touch
canvas.addEventListener("touchmove", e => {
let rect=canvas.getBoundingClientRect();
let touchX = e.touches[0].clientX;
paddle.x = touchX - rect.left - paddle.width/2;
});

// ---------------- UPDATE ----------------
function update(){
if(gameOver) return;

// Paddle move
if(left && paddle.x>0) paddle.x -= paddle.speed;
if(right && paddle.x<canvas.width - paddle.width) paddle.x += paddle.speed;

// Ball move
ball.x += ball.dx;
ball.y += ball.dy;

// Wall bounce
if(ball.x<=0 || ball.x>=canvas.width-ball.size) ball.dx*=-1;
if(ball.y<=0) ball.dy*=-1;

// Paddle collision
if(ball.y+ball.size >= paddle.y &&
ball.x > paddle.x &&
ball.x < paddle.x + paddle.width){
ball.dy*=-1;
}

// Block collision
blocks.forEach(block=>{
if(!block.broken &&
ball.x>block.x &&
ball.x<block.x+blockWidth &&
ball.y>block.y &&
ball.y<block.y+blockHeight){
block.broken=true;
ball.dy*=-1;
score+=10;

// chance to drop power-up
if(Math.random()<0.2){
powerUps.push({x:block.x+blockWidth/2,y:block.y+blockHeight/2,type:Math.random()<0.5?"expand":"slow",size:12});
}
}
});

// Power-ups
powerUps.forEach((p,i)=>{
p.y += 2; // falling
// catch by paddle
if(p.y+ p.size >= paddle.y &&
p.x >= paddle.x &&
p.x <= paddle.x + paddle.width){
activePower = p.type;
powerTimer = 600; // 10 seconds at 60fps
powerUps.splice(i,1);
if(activePower=="expand") paddle.width += 30;
if(activePower=="slow") {ball.dx*=0.7; ball.dy*=0.7;}
}
});

// countdown power-up
if(activePower){
powerTimer--;
if(powerTimer<=0){
if(activePower=="expand") paddle.width -=30;
if(activePower=="slow") {ball.dx/=0.7; ball.dy/=0.7;}
activePower = null;
}
}

// check if level cleared
if(blocks.every(b=>b.broken)){
level++;
if(paddle.width>40) paddle.width-=5;
ball.dx *=1.1;
ball.dy *=1.1;
createBlocks();
}

// game over if ball falls
if(ball.y>canvas.height){
lives--;
if(lives>0){
ball.x = canvas.width/2;
ball.y = canvas.height/2;
ball.dx = 4 + level*0.5;
ball.dy = -4 - level*0.5;
} else {
gameOver = true;
}
}
}

// ---------------- DRAW ----------------
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

// paddle
ctx.fillStyle="dodgerblue";
ctx.fillRect(paddle.x,paddle.y,paddle.width,paddle.height);

// ball
ctx.fillStyle="white";
ctx.fillRect(ball.x,ball.y,ball.size,ball.size);

// blocks
blocks.forEach(block=>{
if(!block.broken){
ctx.fillStyle = block.color;
ctx.fillRect(block.x,block.y,blockWidth,blockHeight);
}
});

// power-ups
powerUps.forEach(p=>{
ctx.fillStyle = p.type=="expand"?"cyan":"orange";
ctx.fillRect(p.x-6,p.y-6,p.size,p.size);
});

// score, level, lives
ctx.fillStyle="yellow";
ctx.font="16px Arial";
ctx.fillText("Score: "+score,10,20);
ctx.fillStyle="cyan";
ctx.fillText("Level: "+level,250,20);
ctx.fillStyle="white";
ctx.fillText("Lives: "+lives,150,20);

// game over
if(gameOver){
ctx.fillStyle="red";
ctx.font="30px Arial";
ctx.fillText("GAME OVER",80,300);
ctx.fillStyle="white";
ctx.font="16px Arial";
ctx.fillText("Press R to Restart",90,330);
}
}

// ---------------- LOOP ----------------
function loop(){
update();
draw();
requestAnimationFrame(loop);
}

// ---------------- RESET ----------------
function resetGame(){
score=0;
level=1;
lives=3;
gameOver=false;
paddle.width=80;
ball.x = canvas.width/2;
ball.y = canvas.height/2;
ball.dx = 4;
ball.dy = -4;
powerUps=[];
activePower=null;
powerTimer=0;
createBlocks();
}

loop();
</script>
</body>
</html>
